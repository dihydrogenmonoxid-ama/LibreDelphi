{% extends "base.html" %}

{% block content %}

<h2 class="text-xl mb-4">Create Study</h2>

<form hx-post="/study/create" hx-trigger="submit">

<input
class="border p-2 mr-2"
name="title"
placeholder="Title"
/>

<input
class="border p-2 mr-2"
name="description"
placeholder="Description"
/>

<button class="bg-blue-600 text-white px-4 py-2">
Create
</button>

</form>

<hr class="my-6">

<h2 class="text-xl mb-4">Studies</h2>

<ul>

{% for study in studies %}

<li class="mb-2">

{{ study.title }}

</li>

{% endfor %}

</ul>

{% endblock %}
